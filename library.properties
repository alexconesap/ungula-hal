sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: hardware abstraction layer (GPIO, PWM, ADC, UART, I2C, SPI, CAN, PWM input, quadrature decoder).
paragraph=Embedded C++17 hardware abstraction: GPIO with pull-ups and edge interrupts, PWM, ADC (AdcManager class with per-unit/attenuation calibration), UART, I2C master, SPI master, CAN 2.0 (ESP-IDF TWAI), I2C multiplexer interface, PWM input capture (`IPwmInput`), quadrature A/B decoder (`IDecoder`, ESP32 PCNT backend). Each peripheral ships with a concrete platform-dispatched driver and a header-only fake for host tests. Higher-level libraries (loadcell, motor, sd, encoder) target the abstract interfaces and stay platform-independent. Supported targets: ESP32 today via ESP-IDF; STM32 and other MCUs are planned — add a new backend under `src/ungula/hal/<subsystem>/platforms/` to port.
