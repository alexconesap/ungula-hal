sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: hardware abstraction layer (GPIO, PWM, ADC, UART, I2C, SPI).
paragraph=Embedded C++17 hardware abstraction: GPIO with pull-ups and edge interrupts, PWM, ADC (AdcManager class with per-unit/attenuation calibration), UART, I2C master, SPI master. Drivers target the C++ interfaces so higher-level libraries (loadcell, motor, sd) stay platform-independent. Supported targets: ESP32 today via ESP-IDF; STM32 and other MCUs are planned — add a new backend under `src/hal/<platform>/` to port.
